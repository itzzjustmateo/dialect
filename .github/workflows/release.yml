name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: gradle build --no-configuration-cache

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: VirusTotal Scan
        if: ${{ secrets.VIRUSTOTAL_API_KEY != '' }}
        run: |
          RESPONSE=$(curl -s --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
            --form "file=@build/libs/LazyDialect-${{ steps.version.outputs.VERSION }}.jar")
          ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.data.id')
          echo "VirusTotal analysis ID: $ANALYSIS_ID"
          sleep 20
          curl -s --request GET \
            --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
            | jq '.data.attributes.stats'
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: LazyDialect ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: build/libs/LazyDialect-${{ steps.version.outputs.VERSION }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Modrinth project description
        if: ${{ secrets.MODRINTH_TOKEN != '' && vars.MODRINTH_ID != '' }}
        run: |
          BODY=$(cat README.md | jq -Rs .)
          curl -s --request PATCH \
            --url "https://api.modrinth.com/v2/project/${{ vars.MODRINTH_ID }}" \
            --header "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            --header "Content-Type: application/json" \
            --data "{\"body\": $BODY}"
        continue-on-error: true

      - name: Publish to Modrinth
        if: ${{ secrets.MODRINTH_TOKEN != '' && vars.MODRINTH_ID != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/LazyDialect-${{ steps.version.outputs.VERSION }}.jar
          name: LazyDialect ${{ steps.version.outputs.VERSION }}
          version: ${{ steps.version.outputs.VERSION }}
          version-type: release
          loaders: paper
          game-versions: |
            1.21.11
          java: 21
          changelog: ${{ github.event.release.body }}
          body: file:README.md
