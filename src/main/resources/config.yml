# ─────────────────────────────────────────────────
# LazyDialect Configuration File
# ─────────────────────────────────────────────────

ai:
  enabled: true
  # Supported providers: openrouter, openai, anthropic, gemini, huggingface
  provider: "openrouter"
  api_key: ""
  # Leave empty for provider default
  endpoint: ""
  model: "openrouter/owl-alpha"
  # Lower = more deterministic output
  temperature: 0.1
  timeout_seconds: 5
  max_retries: 3
  # Base delay (ms) for exponential backoff
  backoff_base_ms: 500

deepl:
  # Fallback translation when no AI provider key is set
  api_key: ""
  # true = api-free.deepl.com, false = api.deepl.com
  use_free_plan: true
  timeout_seconds: 5

languages:
  # WHITELIST = only listed languages allowed, BLACKLIST = listed languages blocked
  mode: "WHITELIST"
  allowed:
    - "en"
    - "de"
  server_default: "en"
  # ALLOW | DENY | WARN | TRANSLATE | SUGGEST_CORRECTION | LOG_ONLY
  fallback_behavior: "WARN"
  # 0.0 to 1.0
  confidence_threshold: 0.75

cache:
  maximum_size: 10000
  expire_after_access_minutes: 30

moderation:
  # ALLOW | DENY | WARN | TRANSLATE | SUGGEST_CORRECTION | LOG_ONLY
  on_violation: "TRANSLATE"
  enable_slang_validation: true
  cooldown_seconds: 2
  notify_staff: true

redis:
  # Distributed caching (optional, requires Redis or Dragonfly)
  enabled: false
  # Supports redis:// and rediss:// (TLS)
  uri: "redis://localhost:6379"
  password: ""
  timeout_seconds: 2
  use_ssl: false

language_selection:
  # Enable the language selection GUI for players (/language)
  # WIP — disabled by default
  enabled: false
  # GUI title (MiniMessage format)
  gui_title: "<color:#478FC6>Select Your Language</color>"

chat_format:
  enabled: true
  template: "<%luckperms_prefix%><player_name><%luckperms_suffix%><gray>:</gray> %message%"
  prefer_lpc: true
  prefer_lpcx: true

effects:
  sounds: true
  particles: true
