name: LazyDialect
description: $description
prefix: "LazyDialect"
version: '${version}'

main: com.vomlabs.dialect.LazyDialect
api-version: '1.21.11'
load: POSTWORLD

authors: [ VOMLabs ]
website: https://vomlabs.com

permissions:
  lazydialect.bypass:
    description: Allows bypassing all chat evaluations, detection, and translation processing
    default: op
  lazydialect.admin.*:
    description: Wildcard node granting access to all diagnostic, monitoring, and structural command routes
    default: op
    children:
      lazydialect.admin.reload: true
      lazydialect.admin.status: true
      lazydialect.admin.detect: true
      lazydialect.admin.translate: true
      lazydialect.admin.cache: true
  lazydialect.admin.reload:
    description: Allows reloading the plugin configuration
    default: op
  lazydialect.admin.status:
    description: Allows viewing plugin status
    default: op
  lazydialect.admin.detect:
    description: Allows manually detecting language of text
    default: op
  lazydialect.admin.translate:
    description: Allows manually translating text
    default: op
  lazydialect.admin.cache:
    description: Allows managing plugin cache
    default: op
  lazydialect.command.language:
    description: Allows using /language command
    default: true
